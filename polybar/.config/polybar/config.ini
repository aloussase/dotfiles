[bar/mybar]
modules-center = date
modules-left = haskell workspaces title
modules-right = memory audio keyboard battery1 battery0 backlight
font-0 = Hasklug Nerd Font:size=11
tray-position = right

[module/title]
type = internal/xwindow
label-maxlen = 50

[module/keyboard]
type = internal/xkeyboard
label-layout = 󰌌 %layout%
format-padding = 1

[module/memory]
type = internal/memory
label = 󰍛 %gb_used%/%gb_total%
format-padding = 1

[module/date]
type = internal/date
interval = 1
date = %a %d %b %H:%M

[module/backlight]
type = internal/backlight
card = intel_backlight
label = 󰳲 %percentage%%
format-padding = 1

[module/battery0]
type = internal/battery
full-at = 100
battery = BAT0
label-full = 󰁹 %percentage%%
label-discharging = 󰁹 %percentage%%
label-charging = 󰂄 %percentage%%
format-full-padding = 1
format-discharging-padding = 1
format-charging-padding = 1

[module/battery1]
type = internal/battery
full-at = 100
battery = BAT1
label-full = 󰁹 %percentage%%
label-discharging = 󰁹 %percentage%%
label-charging = 󰂄 %percentage%%
format-full-padding = 1
format-discharging-padding = 1
format-charging-padding = 1

[module/haskell]
type = custom/text
content = 
content-foreground = #000000
content-background = #ffffff
content-padding = 1
click-left = rofi -show drun

[module/workspaces]
type = internal/xworkspaces
enable-click = true
icon-default = 
label-active = %icon%
label-empty = %icon%
label-occupied = %icon%
label-active-foreground = #000000
label-active-background = #ffffff
label-active-padding = 1
label-empty-padding = 1
label-occupied-padding = 1

[module/audio]
type = internal/pulseaudio
interval = 5
format-volume = <ramp-volume>
label-muted = 󰖁
label-muted-foreground = #666
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 󰕾
format-volume-padding = 1
